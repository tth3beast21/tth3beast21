<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fisker Ocean Probe</title>
<style>
body{background:black;color:lime;font-family:monospace;padding:20px}
button{font-size:20px;margin:8px;padding:12px;width:95%}
#log{white-space:pre-wrap;border:1px solid lime;padding:10px;margin-top:20px}
</style>
</head>
<body>

<h2>FISKER WEBVIEW PROBE</h2>
<a href="file:///sdcard/">Open SD Card</a>
<button onclick="testIntent()">1. Launch Android Settings Intent</button>
<button onclick="testChooser()">2. Launch Generic Intent Chooser</button>
<button onclick="testFisker()">3. Probe Fisker Deep Links</button>
<button onclick="testFiles()">4. Probe Local File Assets</button>
<button onclick="enumBridge()">5. Enumerate JS Native Bridges</button>
<button onclick="popupEscape()">6. Popup / New Window Escape</button>
<button onclick="fullAuto()">7. FULL AUTO TEST</button>

<div id="log">Ready...\n</div>

<script>
function log(t){document.getElementById("log").innerHTML += t + "\n";}

function testIntent(){
log("Trying Android Settings...");
location.href="javascript:window.open("intent://settings#Intent;scheme=android-app;package=com.android.settings;end","_blank")";
}

function testChooser(){
log("Trying chooser...");
location.href="intent://scan/#Intent;scheme=zxing;package=com.google.zxing.client.android;end";
}

function testFisker(){
let links=[
"fisker://ocean",
"fisker://launcher",
"fisker://settings",
"fisker://service",
"fisker://engineering",
"fisker://debug",
"fisker://diagnostics",
"fisker://android",
"fisker://browser"
];
let i=0;
let x=setInterval(()=>{
if(i>=links.length){clearInterval(x);return;}
log("Opening "+links[i]);
location.href=links[i];
i++;
},3000);
}

function testFiles(){
let files=[
"file:///android_asset/",
"file:///android_asset/www/",
"file:///android_asset/index.html",
"file:///sdcard/",
"file:///storage/emulated/0/"
];
let i=0;
let x=setInterval(()=>{
if(i>=files.length){clearInterval(x);return;}
log("Opening "+files[i]);
location.href=files[i];
i++;
},3000);
}

function enumBridge(){
log("Enumerating JS objects...");
for(var k in window){
try{
if(typeof window[k]==='object' || typeof window[k]==='function'){
log("OBJ: "+k);
}
}catch(e){}
}
}

function popupEscape(){
log("Trying popup...");
window.open("https://google.com","_blank");
}

function fullAuto(){
setTimeout(testIntent,1000);
setTimeout(testChooser,5000);
setTimeout(testFisker,9000);
setTimeout(testFiles,40000);
setTimeout(enumBridge,60000);
setTimeout(popupEscape,70000);
}
</script>

</body>
</html>
