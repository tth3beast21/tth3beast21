<!DOCTYPE html>
<html>
<body style="background:black;color:lime;font-family:monospace">

<h3>File Picker Test</h3>

<input type="file" id="fileInput"><br><br>

<button onclick="check()">Check File Input</button>

<p id="log"></p>

<script>
function check(){
    const el = document.getElementById("fileInput");
    if(el && el.files.length === 0){
        document.getElementById("log").innerText =
        "File picker exists but no file selected yet.";
    } else {
        document.getElementById("log").innerText =
        "File system access is working at browser level.";
    }
}
</script>

</body>
</html>
